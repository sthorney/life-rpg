
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.app{padding:1.5rem 0;font-family:var(--font-sans);}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px;}
.level-title{font-size:17px;font-weight:500;color:var(--color-text-primary);}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:1.25rem;}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;}
.stat-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:3px;}
.stat-value{font-size:20px;font-weight:500;color:var(--color-text-primary);}
.xp-wrap{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:1.25rem;}
.xp-row{display:flex;justify-content:space-between;font-size:12px;color:var(--color-text-secondary);margin-bottom:7px;}
.xp-track{height:12px;background:var(--color-background-secondary);border-radius:99px;overflow:hidden;}
.xp-fill{height:100%;background:#7F77DD;border-radius:99px;transition:width .5s ease;}
.tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
.tab{font-size:13px;padding:5px 14px;border-radius:99px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;}
.tab.active{background:#7F77DD;border-color:#7F77DD;color:#fff;}
.quest-list{display:flex;flex-direction:column;gap:7px;margin-bottom:1.25rem;}
.quest{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:11px 14px;display:flex;align-items:center;gap:11px;cursor:pointer;}
.quest:hover{border-color:var(--color-border-secondary);}
.quest.done{opacity:.5;}
.qcheck{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--color-border-secondary);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qcheck.on{background:#7F77DD;border-color:#7F77DD;}
.qcheck.on i{color:#fff;font-size:11px;}
.qinfo{flex:1;min-width:0;}
.qname{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.qsub{font-size:11px;color:var(--color-text-secondary);margin-top:2px;}
.qxp{font-size:12px;font-weight:500;color:#7F77DD;white-space:nowrap;}
.cat-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;margin-right:5px;font-weight:500;}
.cat-fitness{background:#E1F5EE;color:#085041;}
.cat-habit{background:#EEEDFE;color:#3C3489;}
.cat-work{background:#FAEEDA;color:#633806;}
.cat-milestone{background:#FAECE7;color:#712B13;}
.add-row{display:flex;gap:7px;margin-bottom:1.5rem;flex-wrap:wrap;}
.add-row input,.add-row select{font-size:13px;}
.add-row input{flex:1;min-width:160px;}
.section-title{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.rewards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:9px;margin-bottom:1.5rem;}
.reward{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 13px;opacity:.45;}
.reward.unlocked{opacity:1;border-color:#7F77DD;}
.r-icon{font-size:20px;margin-bottom:5px;}
.r-name{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.r-type{font-size:11px;color:var(--color-text-secondary);margin-top:2px;}
.r-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;margin-top:5px;background:#EEEDFE;color:#3C3489;font-weight:500;}
.r-badge.on{background:#7F77DD;color:#fff;}
.milestone-section{margin-bottom:1.5rem;}
.milestone{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px;}
.milestone.done{border-color:#1D9E75;opacity:.7;}
.m-icon{width:32px;height:32px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.m-icon i{color:#085041;font-size:16px;}
.m-info{flex:1;}
.m-name{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.m-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px;}
.m-btn{font-size:12px;padding:5px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;white-space:nowrap;}
.m-btn:hover{background:var(--color-background-secondary);}
.m-done-badge{font-size:11px;padding:4px 10px;border-radius:99px;background:#E1F5EE;color:#085041;font-weight:500;}
.toast{background:#534AB7;color:#fff;font-size:13px;padding:8px 18px;border-radius:99px;text-align:center;margin:1rem auto 0;width:fit-content;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
</style>

<h2 class="sr-only">Customized life gamification tracker — fitness, habits, work quests with milestone rewards</h2>

<div class="app">
  <div class="header">
    <div class="level-title" id="lvl-title">⚔️ Level 1 — Novice Adventurer</div>
    <button onclick="sendPrompt('Give me ideas for more quests and rewards I can add to my life gamification tracker')" style="font-size:12px;padding:5px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;">More ideas ↗</button>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-label">Total XP</div><div class="stat-value" id="s-xp">0</div></div>
    <div class="stat"><div class="stat-label">Level</div><div class="stat-value" id="s-lvl">1</div></div>
    <div class="stat"><div class="stat-label">Done today</div><div class="stat-value" id="s-done">0</div></div>
    <div class="stat"><div class="stat-label">Milestones</div><div class="stat-value" id="s-miles">0</div></div>
  </div>

  <div class="xp-wrap">
    <div class="xp-row"><span>Progress to next level</span><span id="xp-txt">0 / 100 XP</span></div>
    <div class="xp-track"><div class="xp-fill" id="xp-bar" style="width:0%"></div></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="setTab('all',this)">All quests</div>
    <div class="tab" onclick="setTab('fitness',this)">Fitness</div>
    <div class="tab" onclick="setTab('habit',this)">Daily habits</div>
    <div class="tab" onclick="setTab('work',this)">Work</div>
  </div>

  <div class="quest-list" id="quest-list"></div>

  <div class="add-row">
    <input id="q-name" placeholder="New quest..." />
    <select id="q-cat">
      <option value="fitness">Fitness</option>
      <option value="habit">Habit</option>
      <option value="work">Work</option>
    </select>
    <select id="q-xp">
      <option value="10">+10 XP</option>
      <option value="25">+25 XP</option>
      <option value="50">+50 XP</option>
      <option value="100">+100 XP</option>
    </select>
    <button onclick="addQuest()">Add quest</button>
  </div>

  <div class="section-title">Weight & milestone goals</div>
  <div class="milestone-section" id="milestone-list"></div>

  <div class="section-title">Rewards vault</div>
  <div class="rewards-grid" id="reward-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const LEVELS = [0,100,250,500,900,1500,2500,4000,6000,9000];
const TITLES = ["Novice Adventurer","Apprentice Hero","Rising Champion","Seasoned Warrior","Elite Quester","Legendary Achiever","Master of Goals","Grand Champion","Mythic Hero","Ascended Legend"];

let state = {
  xp: 0,
  quests: [
    {id:1,name:"Hit 10,000 steps",cat:"fitness",xp:25,done:false},
    {id:2,name:"Complete a workout (30+ min)",cat:"fitness",xp:40,done:false},
    {id:3,name:"Track all meals for the day",cat:"fitness",xp:20,done:false},
    {id:4,name:"Drink 8 glasses of water",cat:"habit",xp:15,done:false},
    {id:5,name:"Sleep 7+ hours",cat:"habit",xp:20,done:false},
    {id:6,name:"No alcohol today",cat:"habit",xp:25,done:false},
    {id:7,name:"10 min meditation or journaling",cat:"habit",xp:20,done:false},
    {id:8,name:"Complete your #1 priority task",cat:"work",xp:35,done:false},
    {id:9,name:"Clear your inbox to zero",cat:"work",xp:25,done:false},
    {id:10,name:"No social media before noon",cat:"work",xp:20,done:false},
  ],
  milestones: [
    {id:1,name:"Lose first 5 lbs",xp:150,done:false},
    {id:2,name:"Lose 10 lbs total",xp:300,done:false},
    {id:3,name:"Lose 20 lbs total",xp:600,done:false},
    {id:4,name:"30-day streak of any habit",xp:250,done:false},
    {id:5,name:"Complete 20 workouts",xp:200,done:false},
  ],
  rewards: [
    {id:1,name:"Cheat meal of your choice",type:"treat",icon:"🍔",req:100},
    {id:2,name:"New piece of clothing",type:"shopping",icon:"👕",req:250},
    {id:3,name:"Movie night out",type:"experience",icon:"🎬",req:400},
    {id:4,name:"Massage or spa treatment",type:"experience",icon:"💆",req:700},
    {id:5,name:"New workout gear",type:"shopping",icon:"👟",req:1000},
    {id:6,name:"Nice dinner out",type:"experience",icon:"🍽️",req:1500},
    {id:7,name:"Weekend getaway",type:"experience",icon:"🏕️",req:2500},
    {id:8,name:"Big splurge purchase",type:"shopping",icon:"🎁",req:5000},
  ]
};

try{ const s=localStorage.getItem('lifegame2'); if(s) state=JSON.parse(s); }catch(e){}

let currentTab='all';
let nextId=200;

function save(){ try{localStorage.setItem('lifegame2',JSON.stringify(state));}catch(e){} }

function getLevel(xp){
  let l=1;
  for(let i=1;i<LEVELS.length;i++){ if(xp>=LEVELS[i]) l=i+1; else break; }
  return Math.min(l,LEVELS.length);
}

function render(){
  const xp=state.xp;
  const lvl=getLevel(xp);
  const floor=LEVELS[lvl-1];
  const ceil=LEVELS[lvl]||floor+1000;
  const pct=Math.min(100,Math.round((xp-floor)/(ceil-floor)*100));

  document.getElementById('lvl-title').textContent='⚔️ Level '+lvl+' — '+(TITLES[lvl-1]||'Legend');
  document.getElementById('s-xp').textContent=xp;
  document.getElementById('s-lvl').textContent=lvl;
  document.getElementById('s-done').textContent=state.quests.filter(q=>q.done).length;
  document.getElementById('s-miles').textContent=state.milestones.filter(m=>m.done).length;
  document.getElementById('xp-bar').style.width=pct+'%';
  document.getElementById('xp-txt').textContent=(xp-floor)+' / '+(ceil-floor)+' XP';

  const ql=document.getElementById('quest-list');
  ql.innerHTML='';
  state.quests.filter(q=>currentTab==='all'||q.cat===currentTab).forEach(q=>{
    const d=document.createElement('div');
    d.className='quest'+(q.done?' done':'');
    d.innerHTML=`<div class="qcheck${q.done?' on':''}">${q.done?'<i class="ti ti-check"></i>':''}</div>
    <div class="qinfo">
      <div class="qname" style="${q.done?'text-decoration:line-through;':''}">${q.name}</div>
      <div class="qsub"><span class="cat-badge cat-${q.cat}">${q.cat}</span></div>
    </div>
    <div class="qxp">+${q.xp} XP</div>`;
    d.onclick=()=>toggleQuest(q.id);
    ql.appendChild(d);
  });

  const ml=document.getElementById('milestone-list');
  ml.innerHTML='';
  state.milestones.forEach(m=>{
    const d=document.createElement('div');
    d.className='milestone'+(m.done?' done':'');
    d.innerHTML=`<div class="m-icon"><i class="ti ti-trophy" aria-hidden="true"></i></div>
    <div class="m-info">
      <div class="m-name">${m.name}</div>
      <div class="m-sub">Reward: +${m.xp} XP</div>
    </div>
    ${m.done?'<span class="m-done-badge"><i class="ti ti-check" style="font-size:11px"></i> Done</span>':`<button class="m-btn" onclick="claimMilestone(${m.id})">Claim</button>`}`;
    ml.appendChild(d);
  });

  const rl=document.getElementById('reward-list');
  rl.innerHTML='';
  state.rewards.forEach(r=>{
    const u=xp>=r.req;
    const d=document.createElement('div');
    d.className='reward'+(u?' unlocked':'');
    d.innerHTML=`<div class="r-icon">${r.icon}</div>
    <div class="r-name">${r.name}</div>
    <div class="r-type">${r.type} · ${r.req} XP</div>
    <span class="r-badge${u?' on':''}">${u?'Unlocked!':'Locked'}</span>`;
    rl.appendChild(d);
  });
}

function toggleQuest(id){
  const q=state.quests.find(x=>x.id===id);
  if(!q) return;
  const prevLvl=getLevel(state.xp);
  if(!q.done){ q.done=true; state.xp+=q.xp; toast('+'+q.xp+' XP! '+q.name); }
  else { q.done=false; state.xp=Math.max(0,state.xp-q.xp); }
  const newLvl=getLevel(state.xp);
  if(newLvl>prevLvl) setTimeout(()=>toast('Level up! You reached level '+newLvl+' 🎉'),1300);
  save(); render();
}

function claimMilestone(id){
  const m=state.milestones.find(x=>x.id===id);
  if(!m||m.done) return;
  const prevLvl=getLevel(state.xp);
  m.done=true; state.xp+=m.xp;
  toast('Milestone claimed! +'+m.xp+' XP 🏆');
  const newLvl=getLevel(state.xp);
  if(newLvl>prevLvl) setTimeout(()=>toast('Level up! You reached level '+newLvl+' 🎉'),1300);
  save(); render();
}

function addQuest(){
  const n=document.getElementById('q-name').value.trim();
  if(!n) return;
  const cat=document.getElementById('q-cat').value;
  const xp=parseInt(document.getElementById('q-xp').value);
  state.quests.push({id:nextId++,name:n,cat,xp,done:false});
  document.getElementById('q-name').value='';
  save(); render();
}

function setTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}

let toastTimer;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}

document.getElementById('q-name').addEventListener('keydown',e=>{ if(e.key==='Enter') addQuest(); });
render();
</script>
